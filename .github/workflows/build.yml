name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: bid-tool-linux
          - os: windows-latest
            artifact: bid-tool-windows
          - os: macos-latest
            artifact: bid-tool-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller jieba openai trafilatura lxml lxml_html_clean pyyaml requests pdfplumber python-docx
        shell: bash

      - name: Build
        run: |
          SEP=":"
          if [ "$(expr substr $(uname -s) 1 10)" = "MINGW64_NT" ] || [ "$(expr substr $(uname -s) 1 5)" = "MSYS_" ]; then SEP=";"; fi
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=";"; fi
          python -m PyInstaller --onefile --windowed --name="BidTool" \
            --add-data "knowledge${SEP}knowledge" \
            --add-data "sources.yml${SEP}." \
            --add-data "ai.yml${SEP}." \
            desktop.py
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
