name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bid-tool-linux
            sep: ':'
          - os: windows-latest
            artifact: bid-tool-windows
            sep: ';'
          - os: macos-latest
            artifact: bid-tool-macos
            sep: ':'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System deps (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-tk libxml2-dev libxslt-dev

      - name: Install dependencies
        run: pip install pyinstaller jieba openai trafilatura lxml lxml_html_clean pyyaml requests pdfplumber python-docx

      - name: Build
        shell: bash
        run: |
          python -m PyInstaller --onefile --windowed --name="${{ matrix.artifact }}" \
            --add-data "knowledge${{ matrix.sep }}knowledge" \
            --add-data "sources.yml${{ matrix.sep }}." \
            --add-data "ai.yml${{ matrix.sep }}." \
            desktop.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v1
        with:
          files: bid-tool-*
          tag_name: v${{ github.run_number }}
          name: Build #${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
