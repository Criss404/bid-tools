name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bid-tool-linux
            sep: ':'
          - os: windows-latest
            artifact: bid-tool-windows
            sep: ';'
          - os: macos-latest
            artifact: bid-tool-macos
            sep: ':'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller jieba openai trafilatura lxml lxml_html_clean pyyaml requests pdfplumber python-docx

      - name: Build
        run: |
          python -m PyInstaller --onefile --windowed --name="BidTool" \
            --add-data "knowledge${{ matrix.sep }}knowledge" \
            --add-data "sources.yml${{ matrix.sep }}." \
            --add-data "ai.yml${{ matrix.sep }}." \
            desktop.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
